<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>Magic Bells - Papageno's Spelling Game</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: 'Georgia', serif;
  touch-action: manipulation;
  -webkit-user-select: none; user-select: none;
  background: #1a1a2e;
}

#game {
  width: 100vw; height: 100vh;
  position: relative;
  overflow: hidden;
}

/* Background */
#bg {
  position: absolute; inset: 0;
  z-index: 0;
}

/* Top text */
#topText {
  position: absolute;
  top: max(env(safe-area-inset-top, 20px), 20px);
  left: 0; right: 0;
  text-align: center;
  color: #ffd700;
  font-size: clamp(18px, 4vw, 32px);
  font-weight: bold;
  text-shadow: 0 0 10px rgba(255,215,0,0.5), 2px 2px 4px rgba(0,0,0,0.8);
  z-index: 100;
  padding: 0 20px;
  transition: opacity 0.5s;
}

/* Character containers */
#papagenoGroup {
  position: absolute;
  left: 2%;
  bottom: 15%;
  z-index: 10;
  transition: transform 1s ease-in-out;
}
#paminaGroup {
  position: absolute;
  left: 22%;
  bottom: 15%;
  z-index: 10;
  transition: transform 1s ease-in-out;
}
#monostatosGroup {
  position: absolute;
  right: 3%;
  bottom: 15%;
  z-index: 10;
  transition: transform 1s ease-in-out, opacity 0.8s;
}

/* Soldiers */
.soldier {
  position: absolute;
  bottom: 15%;
  z-index: 9;
  transition: transform 0.5s ease-in-out, opacity 0.8s;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.soldier:hover:not(.dancing):not(.exited) {
  filter: brightness(1.2);
}
.soldier.wrong-pick {
  animation: soldierShakeHead 0.5s ease-out;
}
@keyframes soldierShakeHead {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-8px) rotate(-5deg); }
  40% { transform: translateX(8px) rotate(5deg); }
  60% { transform: translateX(-6px) rotate(-3deg); }
  80% { transform: translateX(4px) rotate(2deg); }
}
.soldier.waiting-pick {
  animation: soldierBounce 1s ease-in-out infinite;
}
@keyframes soldierBounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-4px); }
}
#soldier0 { right: 30%; }
#soldier1 { right: 22%; }
#soldier2 { right: 14%; }

/* Animals */
.animal {
  position: absolute;
  z-index: 8;
  transition: transform 1s ease-in-out, opacity 0.8s;
}
.animal.stepped-forward {
  z-index: 15;
  filter: drop-shadow(0 0 10px rgba(255,100,100,0.6));
}
#bat { right: 25%; top: 20%; }
#cat { right: 18%; bottom: 15%; }
#rat { right: 10%; bottom: 12%; }

/* Prompt arrow pointing at soldiers */
#pickPrompt {
  position: absolute;
  top: 55%;
  right: 20%;
  z-index: 200;
  font-size: clamp(16px, 3.5vw, 28px);
  color: #ffd700;
  font-weight: bold;
  text-shadow: 0 2px 6px rgba(0,0,0,0.8);
  opacity: 0;
  transition: opacity 0.5s;
  pointer-events: none;
  text-align: center;
}
#pickPrompt.show { opacity: 1; }

/* Music box tap target */
#musicBoxBtn {
  position: absolute;
  bottom: max(env(safe-area-inset-bottom, 10px), 10px);
  left: 50%;
  transform: translateX(-50%);
  z-index: 200;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  filter: drop-shadow(0 0 15px rgba(255,215,0,0.6));
  transition: filter 0.3s, transform 0.2s;
}
#musicBoxBtn:active {
  filter: drop-shadow(0 0 25px rgba(255,215,0,1));
  transform: translateX(-50%) scale(0.95);
}
#musicBoxBtn.disabled {
  opacity: 0.5;
  pointer-events: none;
}

/* Crank rotation */
.crank-spin {
  animation: crankRotate 0.6s ease-in-out;
  transform-origin: 70px 45px;
}
@keyframes crankRotate {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(720deg); }
}

/* Dancing soldier */
@keyframes soldierDance {
  0%   { transform: rotate(0deg) translateY(0); }
  10%  { transform: rotate(8deg) translateY(-5px); }
  20%  { transform: rotate(-10deg) translateY(0); }
  30%  { transform: rotate(12deg) translateY(-8px); }
  40%  { transform: rotate(-8deg) translateY(-3px); }
  50%  { transform: rotate(10deg) translateY(-10px); }
  60%  { transform: rotate(-12deg) translateY(-5px); }
  70%  { transform: rotate(6deg) translateY(-8px); }
  80%  { transform: rotate(-10deg) translateY(0); }
  90%  { transform: rotate(8deg) translateY(-5px); }
  100% { transform: rotate(0deg) translateY(0); }
}
.dancing {
  animation: soldierDance 0.8s ease-in-out infinite;
}

/* Word display */
#wordDisplay {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 300;
  font-size: clamp(60px, 15vw, 120px);
  font-weight: bold;
  opacity: 0;
  transition: opacity 0.5s;
  text-shadow: 0 0 20px rgba(255,215,0,0.8), 0 0 40px rgba(255,215,0,0.4);
  pointer-events: none;
}
#wordDisplay.show {
  opacity: 1;
}

/* AT card floating */
#atCardFloat {
  position: absolute;
  z-index: 250;
  opacity: 0;
  transition: opacity 0.5s, transform 0.8s ease-in-out;
  pointer-events: none;
}

/* Letter floating from soldier */
#letterFloat {
  position: absolute;
  z-index: 250;
  opacity: 0;
  font-size: clamp(50px, 12vw, 100px);
  font-weight: bold;
  font-family: 'Georgia', serif;
  transition: opacity 0.5s;
  pointer-events: none;
}

/* Praise text */
#praiseText {
  position: absolute;
  top: 35%;
  left: 0; right: 0;
  text-align: center;
  color: #90ee90;
  font-size: clamp(24px, 5vw, 42px);
  font-weight: bold;
  text-shadow: 0 0 10px rgba(144,238,144,0.5), 2px 2px 4px rgba(0,0,0,0.8);
  z-index: 301;
  opacity: 0;
  transition: opacity 0.5s;
  pointer-events: none;
}
#praiseText.show { opacity: 1; }

/* Confetti */
.confetti {
  position: absolute;
  width: 10px; height: 10px;
  z-index: 400;
  opacity: 0.9;
  pointer-events: none;
}
@keyframes confettiFall {
  0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}

/* Final button */
#finalBtn {
  position: absolute;
  bottom: 20%;
  left: 50%;
  transform: translateX(-50%);
  z-index: 500;
  padding: 20px 40px;
  font-size: clamp(20px, 4vw, 32px);
  font-family: 'Georgia', serif;
  font-weight: bold;
  color: #1a1a2e;
  background: linear-gradient(135deg, #ffd700, #ffaa00);
  border: 3px solid #b8860b;
  border-radius: 20px;
  cursor: pointer;
  display: none;
  box-shadow: 0 4px 15px rgba(255,215,0,0.4);
  -webkit-tap-highlight-color: transparent;
}
#finalBtn:active {
  transform: translateX(-50%) scale(0.95);
}

/* Doorway light */
#doorwayLight {
  position: absolute;
  right: 0; bottom: 0;
  width: 25%;
  height: 80%;
  background: radial-gradient(ellipse at right center, rgba(255,255,200,0.4) 0%, transparent 70%);
  z-index: 1;
  opacity: 0;
  transition: opacity 1.5s;
}

/* Sparkles */
@keyframes sparkle {
  0%, 100% { opacity: 0; transform: scale(0); }
  50% { opacity: 1; transform: scale(1); }
}

/* Torch flicker */
@keyframes torchFlicker {
  0%, 100% { opacity: 0.8; }
  50% { opacity: 1; }
  25% { opacity: 0.6; }
  75% { opacity: 0.9; }
}
</style>
</head>

<script>
// ======== AUDIO ENGINE ========
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;

function ensureAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playMusicBoxNote(freq, startTime, duration) {
  const ctx = audioCtx;
  // Main tone
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'sine';
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(0.25, startTime);
  gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start(startTime);
  osc.stop(startTime + duration);

  // Inharmonic partial for metallic shimmer
  const osc2 = ctx.createOscillator();
  const gain2 = ctx.createGain();
  osc2.type = 'sine';
  osc2.frequency.value = freq * 2.76;
  gain2.gain.setValueAtTime(0.06, startTime);
  gain2.gain.exponentialRampToValueAtTime(0.001, startTime + duration * 0.7);
  osc2.connect(gain2);
  gain2.connect(ctx.destination);
  osc2.start(startTime);
  osc2.stop(startTime + duration);
}

function playCrankClick() {
  const ctx = audioCtx;
  const t = ctx.currentTime;
  const bufferSize = ctx.sampleRate * 0.03;
  const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufferSize * 0.15));
  }
  const source = ctx.createBufferSource();
  source.buffer = buffer;
  const filt = ctx.createBiquadFilter();
  filt.type = 'bandpass';
  filt.frequency.value = 3000;
  filt.Q.value = 5;
  const g = ctx.createGain();
  g.gain.setValueAtTime(0.3, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
  source.connect(filt);
  filt.connect(g);
  g.connect(ctx.destination);
  source.start(t);
}

function playMusicBoxMelody() {
  const ctx = audioCtx;
  const t = ctx.currentTime;
  const notes = [1047, 1319, 1568, 1760, 1568, 1319]; // C6 E6 G6 A6 G6 E6
  const dur = 0.2;
  playCrankClick();
  notes.forEach((freq, i) => {
    playMusicBoxNote(freq, t + i * 0.08, dur);
  });
}

function playAnimalSound(type) {
  const ctx = audioCtx;
  const t = ctx.currentTime;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  if (type === 'bat') {
    osc.type = 'square';
    osc.frequency.setValueAtTime(2000, t);
    osc.frequency.exponentialRampToValueAtTime(4000, t + 0.15);
    gain.gain.setValueAtTime(0.1, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(t); osc.stop(t + 0.2);
  } else if (type === 'cat') {
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(600, t);
    osc.frequency.exponentialRampToValueAtTime(300, t + 0.4);
    gain.gain.setValueAtTime(0.12, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(t); osc.stop(t + 0.5);
  } else if (type === 'rat') {
    osc.type = 'square';
    osc.frequency.setValueAtTime(1500, t);
    osc.frequency.exponentialRampToValueAtTime(800, t + 0.12);
    gain.gain.setValueAtTime(0.1, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(t); osc.stop(t + 0.15);
    // Second squeak
    const osc2 = ctx.createOscillator();
    const g2 = ctx.createGain();
    osc2.type = 'square';
    osc2.frequency.setValueAtTime(1800, t + 0.18);
    osc2.frequency.exponentialRampToValueAtTime(900, t + 0.3);
    g2.gain.setValueAtTime(0.08, t + 0.18);
    g2.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
    osc2.connect(g2); g2.connect(ctx.destination);
    osc2.start(t + 0.18); osc2.stop(t + 0.35);
  }
}

function playVictoryJingle() {
  const ctx = audioCtx;
  const t = ctx.currentTime;
  const melody = [1047, 1319, 1568, 1760, 2093]; // C6 E6 G6 A6 C7
  melody.forEach((freq, i) => {
    playMusicBoxNote(freq, t + i * 0.12, 0.4);
  });
}

// ======== GAME STATE ========
const rounds = [
  { letter: 'B', word: 'BAT', animal: 'bat', color: '#3366cc', praise: 'Good job, Tony!' },
  { letter: 'C', word: 'CAT', animal: 'cat', color: '#339933', praise: 'Amazing, Tony!' },
  { letter: 'R', word: 'RAT', animal: 'rat', color: '#cc3333', praise: 'Awesome, Tony!' },
];
let currentRound = 0;
let isAnimating = false;

// ======== DOM REFS ========
const musicBoxBtn = document.getElementById('musicBoxBtn');
const crankGroup = document.getElementById('crankGroup');
const topText = document.getElementById('topText');
const wordDisplay = document.getElementById('wordDisplay');
const praiseText = document.getElementById('praiseText');
const letterFloat = document.getElementById('letterFloat');
const finalBtn = document.getElementById('finalBtn');
const doorwayLight = document.getElementById('doorwayLight');
const papagenoGroup = document.getElementById('papagenoGroup');
const paminaGroup = document.getElementById('paminaGroup');
const monostatosGroup = document.getElementById('monostatosGroup');

function getSoldier(i) { return document.getElementById('soldier' + i); }
function getAnimal(name) { return document.getElementById(name); }

// ======== ANIMATIONS ========
function animateCrank() {
  crankGroup.classList.remove('crank-spin');
  void crankGroup.offsetWidth; // reflow
  crankGroup.classList.add('crank-spin');
}

function sleep(ms) {
  return new Promise(r => setTimeout(r, ms));
}

// Move soldier to center while dancing
async function animateSoldierDance(soldierEl) {
  soldierEl.classList.add('dancing');
  // Move soldier toward center
  soldierEl.style.transition = 'right 2.5s ease-in-out, bottom 0.5s';
  soldierEl.style.right = '45%';
}

// Float the letter from soldier position toward word display
async function animateLetterJoin(round) {
  const soldierEl = getSoldier(currentRound);
  const rect = soldierEl.getBoundingClientRect();

  letterFloat.textContent = round.letter;
  letterFloat.style.color = round.color;
  letterFloat.style.left = rect.left + rect.width / 2 - 30 + 'px';
  letterFloat.style.top = rect.top + 'px';
  letterFloat.style.opacity = '1';
  letterFloat.style.transition = 'left 1s ease-in-out, top 1s ease-in-out, font-size 1s';
  letterFloat.style.fontSize = clampSize(50, 12, 100) + 'px';

  await sleep(50);

  // Move to center
  const cx = window.innerWidth / 2 - 80;
  const cy = window.innerHeight / 2 - 60;
  letterFloat.style.left = cx + 'px';
  letterFloat.style.top = cy + 'px';
  letterFloat.style.fontSize = clampSize(60, 15, 120) + 'px';

  await sleep(1100);

  // Now show the full word
  letterFloat.style.opacity = '0';

  wordDisplay.innerHTML = `<span style="color:${round.color}">${round.letter}</span><span style="color:#cc0000">AT</span>`;
  wordDisplay.style.textShadow = '0 0 20px rgba(255,215,0,0.8), 0 0 40px rgba(255,215,0,0.4)';
  wordDisplay.classList.add('show');

  // Pulse animation
  let scale = 1;
  const pulseId = setInterval(() => {
    scale = scale === 1 ? 1.08 : 1;
    wordDisplay.style.transform = `translate(-50%, -50%) scale(${scale})`;
  }, 500);

  return pulseId;
}

function clampSize(minPx, vw, maxPx) {
  const vwPx = window.innerWidth * vw / 100;
  return Math.max(minPx, Math.min(vwPx, maxPx));
}

async function animateAnimalExit(animalName) {
  const el = getAnimal(animalName);
  playAnimalSound(animalName);
  if (animalName === 'bat') {
    el.style.transition = 'transform 1.5s ease-in, opacity 1.5s';
    el.style.transform = 'translate(-200px, -300px) rotate(720deg) scale(0.2)';
    el.style.opacity = '0';
  } else if (animalName === 'cat') {
    el.style.transition = 'transform 1.2s ease-in, opacity 1.2s';
    el.style.transform = 'translateX(400px) scaleX(-1)';
    el.style.opacity = '0';
  } else if (animalName === 'rat') {
    el.style.transition = 'transform 1s ease-in, opacity 1s';
    el.style.transform = 'translateX(500px) translateY(50px)';
    el.style.opacity = '0';
  }
}

async function animateSoldierExit(soldierEl) {
  soldierEl.style.transition = 'right 1.5s ease-in, opacity 1.5s';
  soldierEl.style.right = '-20%';
  soldierEl.style.opacity = '0';
}

function spawnConfetti(count) {
  const colors = ['#ff0000','#00cc00','#3366ff','#ffcc00','#ff66cc','#00cccc','#ff9900'];
  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'confetti';
    el.style.left = Math.random() * 100 + 'vw';
    el.style.top = '-20px';
    el.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
    el.style.width = (6 + Math.random() * 8) + 'px';
    el.style.height = (6 + Math.random() * 8) + 'px';
    el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    el.style.animation = `confettiFall ${2 + Math.random() * 3}s linear ${Math.random() * 1.5}s forwards`;
    document.getElementById('game').appendChild(el);
  }
}

// ======== ROUND LOGIC ========
let waitingForPick = false;
let correctSoldierIndex = -1;

function beginRound() {
  if (currentRound >= rounds.length) return;

  const round = rounds[currentRound];
  const animalEl = getAnimal(round.animal);

  // Hide music box during picking phase
  musicBoxBtn.classList.add('disabled');

  // 1. Animal steps forward menacingly
  topText.textContent = `Oh no, a ${round.word.toLowerCase()}! Which soldier has the right letter?`;

  // Animate animal stepping forward
  animalEl.classList.add('stepped-forward');
  if (round.animal === 'bat') {
    animalEl.style.transform = 'translate(-60px, 30px) scale(1.3)';
  } else if (round.animal === 'cat') {
    animalEl.style.transform = 'translateX(-80px) scale(1.3)';
  } else {
    animalEl.style.transform = 'translateX(-80px) scale(1.3)';
  }

  // 2. Make all remaining soldiers tappable and bouncy
  for (let i = 0; i < rounds.length; i++) {
    const s = getSoldier(i);
    if (s && s.style.opacity !== '0') {
      s.classList.add('waiting-pick');
    }
  }

  // Show pick prompt
  document.getElementById('pickPrompt').classList.add('show');

  // 3. Wait for Tony to tap a soldier
  waitingForPick = true;
  correctSoldierIndex = currentRound;
}

function onSoldierTapped(soldierIndex) {
  if (!waitingForPick) return;
  ensureAudio();

  const round = rounds[currentRound];
  const tappedSoldier = getSoldier(soldierIndex);

  if (!tappedSoldier || tappedSoldier.style.opacity === '0') return;

  if (soldierIndex === correctSoldierIndex) {
    // CORRECT!
    waitingForPick = false;
    document.getElementById('pickPrompt').classList.remove('show');

    // Stop all soldiers bouncing
    for (let i = 0; i < rounds.length; i++) {
      const s = getSoldier(i);
      if (s) s.classList.remove('waiting-pick');
    }

    playCorrectSequence(round, tappedSoldier);
  } else {
    // Wrong soldier — shake head and gentle sound
    playWrongSound();
    tappedSoldier.classList.add('wrong-pick');
    setTimeout(() => tappedSoldier.classList.remove('wrong-pick'), 500);
  }
}

function playWrongSound() {
  const ctx = audioCtx;
  if (!ctx) return;
  const t = ctx.currentTime;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'triangle';
  osc.frequency.setValueAtTime(300, t);
  osc.frequency.exponentialRampToValueAtTime(200, t + 0.3);
  gain.gain.setValueAtTime(0.15, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
  osc.connect(gain); gain.connect(ctx.destination);
  osc.start(t); osc.stop(t + 0.3);
}

async function playCorrectSequence(round, soldierEl) {
  isAnimating = true;

  // 1. Play music box!
  animateCrank();
  playMusicBoxMelody();
  musicBoxBtn.classList.remove('disabled');

  topText.textContent = 'The music is working!';

  await sleep(400);

  // 2. Soldier dances
  await animateSoldierDance(soldierEl);

  await sleep(2000);

  // 3. Letter floats and joins -AT
  topText.textContent = `${round.letter} + AT = ?`;
  const pulseId = await animateLetterJoin(round);

  await sleep(500);

  // 4. Show completed word
  topText.textContent = `${round.letter} + AT = ${round.word}!`;

  await sleep(3000);

  // 5. Praise
  clearInterval(pulseId);
  wordDisplay.classList.remove('show');
  wordDisplay.style.transform = 'translate(-50%, -50%) scale(1)';

  praiseText.textContent = round.praise;
  praiseText.classList.add('show');

  await sleep(1500);

  // 6. Animal reacts and exits
  const animalEl = getAnimal(round.animal);
  animalEl.classList.remove('stepped-forward');
  await animateAnimalExit(round.animal);

  await sleep(800);

  // 7. Soldier shuffles off
  await animateSoldierExit(soldierEl);

  await sleep(1000);

  praiseText.classList.remove('show');

  currentRound++;
  isAnimating = false;

  if (currentRound < rounds.length) {
    beginRound();
  } else {
    await escapeSequence();
  }
}

async function escapeSequence() {
  topText.textContent = '';
  musicBoxBtn.style.display = 'none';

  await sleep(500);

  // Monostatos stamps and runs
  monostatosGroup.style.transition = 'transform 0.3s';
  for (let i = 0; i < 3; i++) {
    monostatosGroup.style.transform = 'translateY(-10px)';
    await sleep(150);
    monostatosGroup.style.transform = 'translateY(0)';
    await sleep(150);
  }
  await sleep(300);
  monostatosGroup.style.transition = 'transform 1s ease-in, opacity 1s';
  monostatosGroup.style.transform = 'translateX(300px)';
  monostatosGroup.style.opacity = '0';

  await sleep(1000);

  // Show doorway light and archway
  doorwayLight.style.opacity = '1';
  document.getElementById('archway').setAttribute('opacity', '1');

  await sleep(500);

  // Papageno and Pamina run right
  playVictoryJingle();
  papagenoGroup.style.transition = 'transform 2s ease-in-out';
  paminaGroup.style.transition = 'transform 2s ease-in-out';
  papagenoGroup.style.transform = 'translateX(calc(80vw))';
  paminaGroup.style.transform = 'translateX(calc(65vw))';

  await sleep(1000);

  // Confetti
  spawnConfetti(60);

  topText.textContent = 'Fantastic, Tony! Papageno and Pamina escaped!';
  topText.style.fontSize = clampSize(20, 4.5, 36) + 'px';

  await sleep(1500);

  finalBtn.style.display = 'block';
}

// ======== EVENT LISTENERS ========
// Soldiers are tappable
for (let i = 0; i < 3; i++) {
  const s = getSoldier(i);
  if (s) {
    s.addEventListener('click', (e) => {
      e.preventDefault();
      onSoldierTapped(i);
    });
    s.addEventListener('touchend', (e) => {
      e.preventDefault();
      onSoldierTapped(i);
    });
  }
}

// Music box tap just plays the sound for fun (no game effect now)
musicBoxBtn.addEventListener('click', (e) => {
  e.preventDefault();
  ensureAudio();
  animateCrank();
  playMusicBoxMelody();
});

finalBtn.addEventListener('click', () => {
  try {
    window.parent.postMessage({ game: 'magic-bells', event: 'complete' }, '*');
  } catch(e) {}
  finalBtn.textContent = 'Well done!';
  finalBtn.disabled = true;
});

// ======== INITIAL POSITIONING ========
// Bat flutter animation
(function animateBat() {
  const bat = getAnimal('bat');
  if (!bat || bat.style.opacity === '0') return;
  let t = 0;
  function frame() {
    if (bat.style.opacity === '0') return;
    t += 0.05;
    const dy = Math.sin(t) * 8;
    const dx = Math.sin(t * 0.7) * 5;
    bat.style.transform = `translate(${dx}px, ${dy}px)`;
    requestAnimationFrame(frame);
  }
  frame();
})();

// Cat idle animation
(function animateCat() {
  const cat = getAnimal('cat');
  if (!cat) return;
  let t = 0;
  function frame() {
    if (cat.style.opacity === '0') return;
    t += 0.03;
    const s = 1 + Math.sin(t) * 0.03;
    cat.style.transform = `scaleY(${s})`;
    requestAnimationFrame(frame);
  }
  frame();
})();

// Rat scurry animation
(function animateRat() {
  const rat = getAnimal('rat');
  if (!rat) return;
  let t = 0;
  function frame() {
    if (rat.style.opacity === '0') return;
    t += 0.08;
    const dx = Math.sin(t * 2) * 6;
    rat.style.transform = `translateX(${dx}px)`;
    requestAnimationFrame(frame);
  }
  frame();
})();

// Start first round after a brief delay
setTimeout(() => {
  beginRound();
}, 1500);

</script>
