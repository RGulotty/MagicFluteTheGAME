<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>The Magic Flute - Charm the Animals!</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  touch-action: manipulation;
  -webkit-user-select: none; user-select: none;
  background: #1a5c1a;
  font-family: 'Georgia', serif;
}

.screen {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 100; transition: opacity 0.8s;
}
.screen.hidden { opacity: 0; pointer-events: none; }

#intro-screen {
  background: radial-gradient(ellipse at 50% 40%, #87ceeb 0%, #4a8f4a 50%, #2d5a2d 100%);
}
#intro-screen h1 {
  font-size: clamp(32px, 7vw, 64px);
  color: #f0d060;
  text-shadow: 0 0 30px #f0d06090, 0 4px 8px #00000060;
  margin-bottom: 10px;
  text-align: center;
  padding: 0 20px;
}
#intro-screen h2 {
  font-size: clamp(16px, 4vw, 28px);
  color: #fff;
  text-shadow: 0 2px 6px #00000080;
  margin-bottom: 40px;
  text-align: center;
  padding: 0 20px;
}

.big-btn {
  font-size: clamp(28px, 6vw, 48px);
  padding: 16px 60px;
  border: none;
  border-radius: 20px;
  cursor: pointer;
  font-family: 'Georgia', serif;
  font-weight: bold;
  transition: transform 0.1s;
}
.big-btn:active { transform: scale(0.93); }
#start-btn {
  background: linear-gradient(180deg, #f0d060, #c8a830);
  color: #5a3a00;
  box-shadow: 0 6px 0 #9a7a20, 0 8px 20px #00000060;
}

/* --- GAME SCREEN --- */
#game-screen {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  z-index: 50;
  display: none;
}
#game-screen.active { display: block; }

/* Forest background */
#forest-bg {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: linear-gradient(180deg, #87ceeb 0%, #a8d8ea 25%, #6abf6a 55%, #3a7a3a 75%, #2a5a2a 100%);
}

/* Sun */
.sun {
  position: absolute; top: 5%; left: 70%;
  width: clamp(60px, 10vw, 100px); height: clamp(60px, 10vw, 100px);
  background: radial-gradient(circle, #fff8c0 20%, #f8d030 60%, transparent 70%);
  border-radius: 50%;
  animation: sunGlow 3s ease-in-out infinite;
}
@keyframes sunGlow {
  0%, 100% { transform: scale(1); filter: brightness(1); }
  50% { transform: scale(1.1); filter: brightness(1.15); }
}

/* Trees */
.tree {
  position: absolute;
  bottom: 25%;
}
.tree svg { width: 100%; height: 100%; }

/* Grass */
.grass-layer {
  position: absolute; bottom: 0; left: 0; width: 100%; height: 30%;
  background: linear-gradient(180deg, #4a9a4a 0%, #3a7a3a 40%, #2d6a2d 100%);
  border-radius: 50% 50% 0 0 / 20px 20px 0 0;
}

/* Flowers */
.flower {
  position: absolute;
  animation: flowerSway 4s ease-in-out infinite;
}
@keyframes flowerSway {
  0%, 100% { transform: rotate(-3deg); }
  50% { transform: rotate(3deg); }
}

/* Tamino */
#tamino {
  position: absolute;
  bottom: 20%;
  left: 15%;
  width: clamp(80px, 15vw, 140px);
  z-index: 20;
  transition: all 0.3s;
}
#tamino.playing {
  animation: taminoPlay 0.5s ease-in-out;
}
@keyframes taminoPlay {
  0%, 100% { transform: translateY(0); }
  25% { transform: translateY(-5px) rotate(-2deg); }
  75% { transform: translateY(-3px) rotate(2deg); }
}

/* Animals */
.animal-container {
  position: absolute;
  z-index: 15;
  transition: all 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.animal-container.hidden-animal {
  filter: brightness(0) saturate(0);
  opacity: 0.5;
  transform: scale(0.7);
}
.animal-container.charmed {
  filter: none;
  opacity: 1;
  transform: scale(1);
  animation: animalDance 1.5s ease-in-out infinite;
}
.animal-container.appearing {
  filter: none;
  opacity: 1;
  transform: scale(1.2);
}
@keyframes animalDance {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  25% { transform: translateY(-8px) rotate(-3deg); }
  50% { transform: translateY(-2px) rotate(0deg); }
  75% { transform: translateY(-10px) rotate(3deg); }
}

/* Animal positions */
#animal-deer { top: 25%; right: 20%; width: clamp(60px, 12vw, 110px); }
#animal-lion { top: 35%; left: 40%; width: clamp(70px, 13vw, 120px); }
#animal-bird { top: 10%; right: 35%; width: clamp(40px, 8vw, 70px); }
#animal-rabbit { top: 40%; right: 10%; width: clamp(50px, 9vw, 80px); }
#animal-bear { top: 20%; left: 55%; width: clamp(70px, 13vw, 120px); }

/* Current animal indicator */
.animal-container.current {
  filter: brightness(0) saturate(0) drop-shadow(0 0 8px #f0d060);
  opacity: 0.8;
  animation: peekAnim 2s ease-in-out infinite;
}
@keyframes peekAnim {
  0%, 100% { transform: scale(0.7) translateX(0); }
  50% { transform: scale(0.8) translateX(5px); }
}

/* Note buttons */
#note-panel {
  position: absolute;
  bottom: 3%;
  right: 2%;
  left: 2%;
  display: flex;
  justify-content: center;
  gap: clamp(8px, 2vw, 16px);
  z-index: 30;
  padding: 12px;
  background: rgba(0,0,0,0.2);
  border-radius: 20px;
}
.note-btn {
  width: clamp(60px, 14vw, 90px);
  height: clamp(60px, 14vw, 90px);
  border: none;
  border-radius: 50%;
  cursor: pointer;
  font-size: clamp(20px, 4vw, 32px);
  font-weight: bold;
  color: #fff;
  text-shadow: 0 2px 4px rgba(0,0,0,0.4);
  transition: transform 0.1s, box-shadow 0.1s;
  position: relative;
  display: flex; align-items: center; justify-content: center;
}
.note-btn:active { transform: scale(0.9); }
.note-btn.highlight {
  transform: scale(1.15);
  box-shadow: 0 0 30px rgba(255,255,255,0.8) !important;
}
.note-btn[data-note="0"] {
  background: linear-gradient(135deg, #ff6b6b, #c0392b);
  box-shadow: 0 4px 0 #962d22, 0 6px 15px rgba(192,57,43,0.4);
}
.note-btn[data-note="1"] {
  background: linear-gradient(135deg, #54a0ff, #2e86de);
  box-shadow: 0 4px 0 #2472c4, 0 6px 15px rgba(46,134,222,0.4);
}
.note-btn[data-note="2"] {
  background: linear-gradient(135deg, #5cd85c, #27ae60);
  box-shadow: 0 4px 0 #1e8c4d, 0 6px 15px rgba(39,174,96,0.4);
}
.note-btn[data-note="3"] {
  background: linear-gradient(135deg, #ffd93d, #f39c12);
  box-shadow: 0 4px 0 #c87f0a, 0 6px 15px rgba(243,156,18,0.4);
}
.note-btn[data-note="4"] {
  background: linear-gradient(135deg, #a55eea, #8854d0);
  box-shadow: 0 4px 0 #6c3fb5, 0 6px 15px rgba(136,84,208,0.4);
}

/* Status text */
#status-text {
  position: absolute;
  top: 3%;
  left: 50%;
  transform: translateX(-50%);
  font-size: clamp(18px, 4vw, 30px);
  color: #fff;
  text-shadow: 0 2px 8px rgba(0,0,0,0.6);
  z-index: 30;
  text-align: center;
  background: rgba(0,0,0,0.25);
  padding: 8px 24px;
  border-radius: 20px;
  white-space: nowrap;
}

/* Sparkle */
.sparkle {
  position: absolute;
  width: 10px; height: 10px;
  pointer-events: none;
  z-index: 40;
}
.sparkle::before, .sparkle::after {
  content: '';
  position: absolute;
  background: #f0d060;
  border-radius: 50%;
}
.sparkle::before {
  width: 100%; height: 30%;
  top: 35%; left: 0;
}
.sparkle::after {
  width: 30%; height: 100%;
  top: 0; left: 35%;
}

/* Music note float */
.music-note-float {
  position: absolute;
  font-size: 28px;
  pointer-events: none;
  z-index: 40;
  animation: noteFloat 2s ease-out forwards;
}
@keyframes noteFloat {
  0% { opacity: 1; transform: translateY(0) rotate(0deg); }
  100% { opacity: 0; transform: translateY(-80px) rotate(20deg); }
}

/* Celebration screen */
#celebration-screen {
  background: radial-gradient(ellipse at 50% 40%, #87ceeb 0%, #4a8f4a 50%, #2d5a2d 100%);
}
#celebration-screen h1 {
  font-size: clamp(24px, 5vw, 48px);
  color: #f0d060;
  text-shadow: 0 0 30px #f0d06090, 0 4px 8px #00000060;
  margin-bottom: 10px;
  text-align: center;
  padding: 0 20px;
}
#celebration-screen h2 {
  font-size: clamp(14px, 3vw, 24px);
  color: #fff;
  text-shadow: 0 2px 6px #00000080;
  margin-bottom: 40px;
  text-align: center;
  padding: 0 20px;
}
#continue-btn {
  background: linear-gradient(180deg, #f0d060, #c8a830);
  color: #5a3a00;
  box-shadow: 0 6px 0 #9a7a20, 0 8px 20px #00000060;
}

/* Confetti */
.confetti {
  position: absolute;
  width: 10px; height: 10px;
  z-index: 45;
  pointer-events: none;
  animation: confettiFall linear forwards;
}
@keyframes confettiFall {
  0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0.5; }
}

/* Intro Tamino SVG */
.intro-tamino {
  width: clamp(100px, 20vw, 180px);
  margin-bottom: 20px;
}
</style>
</head>
<body>

<!-- INTRO SCREEN -->
<div class="screen" id="intro-screen">
  <svg class="intro-tamino" viewBox="0 0 120 200" xmlns="http://www.w3.org/2000/svg">
    <!-- Tamino silhouette for intro -->
    <defs>
      <radialGradient id="introGlow" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#f0d060" stop-opacity="0.6"/>
        <stop offset="100%" stop-color="#f0d060" stop-opacity="0"/>
      </radialGradient>
    </defs>
    <circle cx="60" cy="100" r="55" fill="url(#introGlow)"/>
    <!-- Cape -->
    <path d="M40,90 Q20,130 30,170 L60,160 L90,170 Q100,130 80,90 Z" fill="#3050a0" opacity="0.8"/>
    <!-- Body -->
    <rect x="45" y="80" width="30" height="60" rx="5" fill="#4060c0"/>
    <!-- Belt -->
    <rect x="45" y="110" width="30" height="5" rx="2" fill="#f0d060"/>
    <!-- Head -->
    <circle cx="60" cy="68" r="18" fill="#f0c8a0"/>
    <!-- Hair -->
    <path d="M42,62 Q45,45 60,42 Q75,45 78,62 Q75,55 60,53 Q45,55 42,62Z" fill="#8B6914"/>
    <!-- Arms -->
    <path d="M45,90 L25,100 L30,105 L48,95Z" fill="#4060c0"/>
    <path d="M75,90 L100,85 L102,80" fill="none" stroke="#4060c0" stroke-width="8" stroke-linecap="round"/>
    <!-- Flute -->
    <rect x="95" y="72" width="25" height="6" rx="3" fill="#f0d060" transform="rotate(-15, 95, 75)"/>
    <circle cx="95" cy="75" r="3" fill="#f0d060"/>
    <!-- Legs -->
    <rect x="48" y="138" width="10" height="28" rx="4" fill="#3a3a6a"/>
    <rect x="62" y="138" width="10" height="28" rx="4" fill="#3a3a6a"/>
    <!-- Boots -->
    <ellipse cx="53" cy="168" rx="8" ry="4" fill="#5a3a20"/>
    <ellipse cx="67" cy="168" rx="8" ry="4" fill="#5a3a20"/>
  </svg>
  <h1>The Magic Flute</h1>
  <h2>Play the magic flute to charm the animals!</h2>
  <button class="big-btn" id="start-btn" onclick="startGame()">Play!</button>
</div>

<!-- GAME SCREEN -->
<div id="game-screen">
  <div id="forest-bg">
    <div class="sun"></div>

    <!-- Trees as SVG -->
    <svg class="tree" style="left:0; width:20%; height:60%;" viewBox="0 0 100 200">
      <rect x="40" y="100" width="20" height="100" fill="#5a3a20"/>
      <ellipse cx="50" cy="80" rx="45" ry="60" fill="#2a7a2a"/>
      <ellipse cx="35" cy="70" rx="30" ry="45" fill="#3a8a3a"/>
    </svg>
    <svg class="tree" style="right:0; width:18%; height:55%;" viewBox="0 0 100 200">
      <rect x="40" y="110" width="20" height="90" fill="#6a4a28"/>
      <ellipse cx="50" cy="90" rx="40" ry="55" fill="#2a7a2a"/>
      <ellipse cx="60" cy="80" rx="30" ry="40" fill="#3a9a3a"/>
    </svg>
    <svg class="tree" style="left:30%; width:12%; height:45%;" viewBox="0 0 100 200">
      <rect x="42" y="120" width="16" height="80" fill="#5a3a20"/>
      <ellipse cx="50" cy="100" rx="35" ry="50" fill="#2a8a2a"/>
    </svg>
    <svg class="tree" style="right:22%; width:14%; height:50%;" viewBox="0 0 100 200">
      <rect x="42" y="110" width="16" height="90" fill="#6a4a28"/>
      <ellipse cx="50" cy="90" rx="38" ry="52" fill="#338a33"/>
    </svg>

    <!-- Flowers -->
    <div class="flower" style="bottom:22%; left:25%;">
      <svg width="20" height="30" viewBox="0 0 20 30"><rect x="9" y="15" width="2" height="15" fill="#4a8a4a"/>
      <circle cx="10" cy="10" r="6" fill="#ff6b9d"/><circle cx="10" cy="10" r="3" fill="#ffd93d"/></svg>
    </div>
    <div class="flower" style="bottom:24%; left:60%;">
      <svg width="20" height="30" viewBox="0 0 20 30"><rect x="9" y="15" width="2" height="15" fill="#4a8a4a"/>
      <circle cx="10" cy="10" r="6" fill="#54a0ff"/><circle cx="10" cy="10" r="3" fill="#fff"/></svg>
    </div>
    <div class="flower" style="bottom:20%; right:15%;">
      <svg width="20" height="30" viewBox="0 0 20 30"><rect x="9" y="15" width="2" height="15" fill="#4a8a4a"/>
      <circle cx="10" cy="10" r="6" fill="#ffd93d"/><circle cx="10" cy="10" r="3" fill="#fff"/></svg>
    </div>
    <div class="flower" style="bottom:26%; left:45%;">
      <svg width="16" height="24" viewBox="0 0 20 30"><rect x="9" y="15" width="2" height="15" fill="#4a8a4a"/>
      <circle cx="10" cy="10" r="6" fill="#ff9ff3"/><circle cx="10" cy="10" r="3" fill="#ffd93d"/></svg>
    </div>

    <div class="grass-layer"></div>
  </div>

  <!-- Tamino SVG -->
  <div id="tamino">
    <svg viewBox="0 0 120 200" xmlns="http://www.w3.org/2000/svg">
      <!-- Cape flowing -->
      <path d="M35,88 Q10,130 25,175 L60,162 L95,175 Q110,130 85,88 Z" fill="#3050a0" opacity="0.85">
        <animate attributeName="d" dur="3s" repeatCount="indefinite"
          values="M35,88 Q10,130 25,175 L60,162 L95,175 Q110,130 85,88 Z;
                  M35,88 Q15,130 20,175 L60,165 L100,175 Q105,130 85,88 Z;
                  M35,88 Q10,130 25,175 L60,162 L95,175 Q110,130 85,88 Z"/>
      </path>
      <!-- Body tunic -->
      <rect x="43" y="78" width="34" height="62" rx="6" fill="#4060c0"/>
      <!-- Tunic details -->
      <line x1="60" y1="82" x2="60" y2="138" stroke="#5070d0" stroke-width="1.5"/>
      <rect x="43" y="108" width="34" height="6" rx="3" fill="#f0d060"/>
      <!-- Collar -->
      <path d="M47,80 L60,86 L73,80" fill="none" stroke="#fff" stroke-width="2"/>
      <!-- Head -->
      <circle cx="60" cy="64" r="18" fill="#f0c8a0"/>
      <!-- Eyes -->
      <ellipse cx="53" cy="62" rx="2.5" ry="3" fill="#3a3a5a"/>
      <ellipse cx="67" cy="62" rx="2.5" ry="3" fill="#3a3a5a"/>
      <circle cx="54" cy="61" r="1" fill="#fff"/>
      <circle cx="68" cy="61" r="1" fill="#fff"/>
      <!-- Smile -->
      <path d="M54,70 Q60,76 66,70" fill="none" stroke="#a0705a" stroke-width="1.5" stroke-linecap="round"/>
      <!-- Hair -->
      <path d="M42,58 Q44,40 60,38 Q76,40 78,58 Q76,50 60,47 Q44,50 42,58Z" fill="#8B6914"/>
      <path d="M42,58 Q40,62 42,66" fill="none" stroke="#8B6914" stroke-width="3" stroke-linecap="round"/>
      <path d="M78,58 Q80,62 78,66" fill="none" stroke="#8B6914" stroke-width="3" stroke-linecap="round"/>
      <!-- Left arm -->
      <path d="M43,88 L26,100 L30,106 L46,96Z" fill="#4060c0"/>
      <!-- Right arm (holding flute up) -->
      <path d="M77,88 Q90,80 98,72" fill="none" stroke="#4060c0" stroke-width="9" stroke-linecap="round"/>
      <circle cx="97" cy="73" r="5" fill="#f0c8a0"/>
      <!-- Flute -->
      <rect x="92" y="66" width="28" height="5" rx="2.5" fill="#f0d060" transform="rotate(-10, 92, 68)"/>
      <rect x="92" y="66" width="28" height="5" rx="2.5" fill="url(#fluteShine)" transform="rotate(-10, 92, 68)"/>
      <circle cx="97" cy="70" r="1.5" fill="#c8a020"/>
      <circle cx="103" cy="69" r="1.5" fill="#c8a020"/>
      <circle cx="109" cy="67.5" r="1.5" fill="#c8a020"/>
      <defs>
        <linearGradient id="fluteShine" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#fff" stop-opacity="0.3"/>
          <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <!-- Legs -->
      <rect x="46" y="138" width="11" height="28" rx="5" fill="#3a3a6a"/>
      <rect x="63" y="138" width="11" height="28" rx="5" fill="#3a3a6a"/>
      <!-- Boots -->
      <path d="M44,163 Q46,170 56,170 Q58,168 58,163Z" fill="#5a3a20"/>
      <path d="M62,163 Q64,170 74,170 Q76,168 76,163Z" fill="#5a3a20"/>
    </svg>
  </div>

  <!-- Animals -->
  <div id="animal-deer" class="animal-container hidden-animal">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <!-- Deer body -->
      <ellipse cx="50" cy="60" rx="28" ry="18" fill="#c8904a"/>
      <!-- Legs -->
      <rect x="28" y="72" width="6" height="22" rx="3" fill="#b07838"/>
      <rect x="38" y="74" width="6" height="20" rx="3" fill="#b07838"/>
      <rect x="56" y="74" width="6" height="20" rx="3" fill="#b07838"/>
      <rect x="66" y="72" width="6" height="22" rx="3" fill="#b07838"/>
      <!-- Hooves -->
      <rect x="27" y="92" width="8" height="4" rx="2" fill="#5a3a20"/>
      <rect x="37" y="92" width="8" height="4" rx="2" fill="#5a3a20"/>
      <rect x="55" y="92" width="8" height="4" rx="2" fill="#5a3a20"/>
      <rect x="65" y="92" width="8" height="4" rx="2" fill="#5a3a20"/>
      <!-- Neck + head -->
      <ellipse cx="30" cy="42" rx="10" ry="14" fill="#c8904a" transform="rotate(-15,30,42)"/>
      <ellipse cx="26" cy="30" rx="10" ry="11" fill="#c8904a"/>
      <!-- Spots -->
      <circle cx="45" cy="55" r="3" fill="#e0b070"/>
      <circle cx="55" cy="58" r="2.5" fill="#e0b070"/>
      <circle cx="60" cy="52" r="2" fill="#e0b070"/>
      <circle cx="40" cy="62" r="2" fill="#e0b070"/>
      <!-- Ear -->
      <ellipse cx="18" cy="22" rx="4" ry="7" fill="#c8904a" transform="rotate(-20,18,22)"/>
      <ellipse cx="34" cy="20" rx="4" ry="7" fill="#c8904a" transform="rotate(20,34,20)"/>
      <!-- Inner ear -->
      <ellipse cx="18" cy="22" rx="2.5" ry="5" fill="#e8a0a0" transform="rotate(-20,18,22)"/>
      <ellipse cx="34" cy="20" rx="2.5" ry="5" fill="#e8a0a0" transform="rotate(20,34,20)"/>
      <!-- Eyes (big, cute) -->
      <ellipse cx="21" cy="28" rx="4" ry="4.5" fill="#fff"/>
      <ellipse cx="21" cy="29" rx="2.5" ry="3" fill="#3a2010"/>
      <circle cx="20" cy="28" r="1" fill="#fff"/>
      <ellipse cx="31" cy="28" rx="3.5" ry="4" fill="#fff"/>
      <ellipse cx="31" cy="29" rx="2" ry="2.5" fill="#3a2010"/>
      <circle cx="30" cy="28" r="0.8" fill="#fff"/>
      <!-- Nose -->
      <ellipse cx="22" cy="35" rx="3" ry="2" fill="#5a3020"/>
      <!-- Antlers -->
      <path d="M22,16 L18,4 L14,8 M18,4 L22,2" fill="none" stroke="#8a6020" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M32,14 L36,2 L40,6 M36,2 L32,0" fill="none" stroke="#8a6020" stroke-width="2.5" stroke-linecap="round"/>
      <!-- Tail -->
      <ellipse cx="78" cy="52" rx="4" ry="3" fill="#e8d0a0"/>
    </svg>
  </div>

  <div id="animal-lion" class="animal-container hidden-animal">
    <svg viewBox="0 0 110 100" xmlns="http://www.w3.org/2000/svg">
      <!-- Mane -->
      <circle cx="40" cy="40" r="25" fill="#e8a020"/>
      <circle cx="30" cy="35" r="10" fill="#d89018"/>
      <circle cx="50" cy="30" r="10" fill="#d89018"/>
      <circle cx="55" cy="42" r="9" fill="#d89018"/>
      <circle cx="25" cy="48" r="9" fill="#d89018"/>
      <!-- Body -->
      <ellipse cx="60" cy="60" rx="30" ry="18" fill="#e8b830"/>
      <!-- Head -->
      <circle cx="40" cy="42" r="16" fill="#e8b830"/>

<!-- CELEBRATION SCREEN -->
<div class="screen hidden" id="celebration-screen">
  <h1>The magic flute has charmed all the animals!</h1>
  <h2>Tamino and his friends dance together!</h2>
  <button class="big-btn" id="continue-btn" onclick="finishGame()">Hooray!</button>
</div>

<script>
// ===== AUDIO ENGINE =====
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let actx = null;

function ensureAudio() {
  if (!actx) actx = new AudioCtx();
  if (actx.state === 'suspended') actx.resume();
}

// Note frequencies: C4, D4, E4, F4, G4
const NOTE_FREQS = [261.63, 293.66, 329.63, 349.23, 392.00];

function playNote(noteIndex, duration = 0.5, startTime = null) {
  ensureAudio();
  const t = startTime || actx.currentTime;
  const freq = NOTE_FREQS[noteIndex];

  // Flute-like: sine + triangle layered
  const gain = actx.createGain();
  gain.connect(actx.destination);
  gain.gain.setValueAtTime(0, t);
  gain.gain.linearRampToValueAtTime(0.25, t + 0.06);
  gain.gain.setValueAtTime(0.25, t + duration - 0.1);
  gain.gain.linearRampToValueAtTime(0, t + duration);

  const osc1 = actx.createOscillator();
  osc1.type = 'sine';
  osc1.frequency.setValueAtTime(freq, t);
  osc1.connect(gain);
  osc1.start(t);
  osc1.stop(t + duration);

  const gain2 = actx.createGain();
  gain2.connect(actx.destination);
  gain2.gain.setValueAtTime(0, t);
  gain2.gain.linearRampToValueAtTime(0.08, t + 0.06);
  gain2.gain.setValueAtTime(0.08, t + duration - 0.1);
  gain2.gain.linearRampToValueAtTime(0, t + duration);

  const osc2 = actx.createOscillator();
  osc2.type = 'triangle';
  osc2.frequency.setValueAtTime(freq, t);
  osc2.connect(gain2);
  osc2.start(t);
  osc2.stop(t + duration);

  // Soft overtone
  const gain3 = actx.createGain();
  gain3.connect(actx.destination);
  gain3.gain.setValueAtTime(0, t);
  gain3.gain.linearRampToValueAtTime(0.03, t + 0.08);
  gain3.gain.setValueAtTime(0.03, t + duration - 0.12);
  gain3.gain.linearRampToValueAtTime(0, t + duration);

  const osc3 = actx.createOscillator();
  osc3.type = 'sine';
  osc3.frequency.setValueAtTime(freq * 2, t);
  osc3.connect(gain3);
  osc3.start(t);
  osc3.stop(t + duration);
}

function playCorrectChime() {
  ensureAudio();
  const t = actx.currentTime;
  // Ascending arpeggio
  [0, 2, 4].forEach((n, i) => {
    playNote(n, 0.3, t + i * 0.15);
  });
}

function playWrongSound() {
  ensureAudio();
  const t = actx.currentTime;
  const gain = actx.createGain();
  gain.connect(actx.destination);
  gain.gain.setValueAtTime(0.15, t);
  gain.gain.linearRampToValueAtTime(0, t + 0.5);
  const osc = actx.createOscillator();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(180, t);
  osc.frequency.linearRampToValueAtTime(140, t + 0.5);
  osc.connect(gain);
  osc.start(t);
  osc.stop(t + 0.5);
}

function playAnimalFanfare() {
  ensureAudio();
  const t = actx.currentTime;
  const notes = [0, 2, 4, 4];
  notes.forEach((n, i) => {
    playNote(n, 0.25, t + i * 0.2);
  });
}

function playCelebrationMelody() {
  ensureAudio();
  const t = actx.currentTime;
  const melody = [0, 1, 2, 3, 4, 4, 3, 4];
  melody.forEach((n, i) => {
    playNote(n, 0.3, t + i * 0.25);
  });
}

// Forest ambiance
let ambianceInterval = null;
function startAmbiance() {
  ensureAudio();
  // Try loading flute-animals.mp3 first
  const audio = new Audio('flute-animals.mp3');
  audio.loop = true;
  audio.volume = 0.3;
  audio.play().catch(() => {
    // Generate ambient sounds
    generateChirp();
    ambianceInterval = setInterval(() => {
      if (Math.random() < 0.3) generateChirp();
    }, 3000);
  });
}

function generateChirp() {
  if (!actx) return;
  const t = actx.currentTime + Math.random() * 0.5;
  const gain = actx.createGain();
  gain.connect(actx.destination);
  gain.gain.setValueAtTime(0, t);
  gain.gain.linearRampToValueAtTime(0.04, t + 0.05);
  gain.gain.linearRampToValueAtTime(0, t + 0.2);

  const osc = actx.createOscillator();
  osc.type = 'sine';
  const baseFreq = 1800 + Math.random() * 1200;
  osc.frequency.setValueAtTime(baseFreq, t);
  osc.frequency.linearRampToValueAtTime(baseFreq * (0.8 + Math.random() * 0.4), t + 0.15);
  osc.connect(gain);
  osc.start(t);
  osc.stop(t + 0.25);
}

// ===== GAME STATE =====
const ANIMALS = [
  { id: 'deer', name: 'Deer' },
  { id: 'lion', name: 'Lion' },
  { id: 'bird', name: 'Bird' },
  { id: 'rabbit', name: 'Rabbit' },
  { id: 'bear', name: 'Bear' }
];

// Melodies: first animal is 2 notes, rest are 3 (adjacent notes for ease)
const MELODIES = [
  [0, 1],       // C-D (deer, easy!)
  [1, 2, 3],   // D-E-F
  [2, 3, 4],   // E-F-G
  [0, 1, 2],   // C-D-E
  [2, 1, 0],   // E-D-C
];

let currentAnimalIndex = 0;
let currentMelody = [];
let playerInput = [];
let isPlayingMelody = false;
let canInput = false;

const noteButtons = document.querySelectorAll('.note-btn');
const statusText = document.getElementById('status-text');
const tamino = document.getElementById('tamino');

// ===== SCREENS =====
function startGame() {
  ensureAudio();
  document.getElementById('intro-screen').classList.add('hidden');
  document.getElementById('game-screen').classList.add('active');
  startAmbiance();
  setTimeout(() => {
    beginAnimal(0);
  }, 800);
}

function beginAnimal(index) {
  currentAnimalIndex = index;
  currentMelody = MELODIES[index];
  playerInput = [];
  canInput = false;

  const animal = ANIMALS[index];
  const el = document.getElementById('animal-' + animal.id);

  // Show this animal as "current" (peeking silhouette)
  el.classList.remove('hidden-animal');
  el.classList.add('current');

  statusText.textContent = `Charm the ${animal.name}! Watch...`;

  setTimeout(() => {
    playMelodySequence();
  }, 1200);
}

function playMelodySequence() {
  isPlayingMelody = true;
  canInput = false;
  statusText.textContent = 'Watch the melody!';

  let i = 0;
  const interval = setInterval(() => {
    if (i >= currentMelody.length) {
      clearInterval(interval);
      isPlayingMelody = false;
      canInput = true;
      statusText.textContent = 'Your turn! Play the notes!';
      return;
    }
    highlightButton(currentMelody[i]);
    playNote(currentMelody[i], 0.5);
    i++;
  }, 700); // 0.6s note + 0.1s gap
}

function highlightButton(noteIndex) {
  const btn = noteButtons[noteIndex];
  btn.classList.add('highlight');
  setTimeout(() => btn.classList.remove('highlight'), 500);
}

// ===== NOTE BUTTON INTERACTION =====
noteButtons.forEach(btn => {
  const handler = (e) => {
    e.preventDefault();
    if (!canInput || isPlayingMelody) return;
    const noteIndex = parseInt(btn.dataset.note);
    ensureAudio();
    playNote(noteIndex, 0.4);
    highlightButton(noteIndex);
    taminoPlayAnim();
    spawnMusicNote();

    playerInput.push(noteIndex);

    // Check input so far
    const pos = playerInput.length - 1;
    if (playerInput[pos] !== currentMelody[pos]) {
      // Wrong note
      canInput = false;
      playerInput = [];
      playWrongSound();
      statusText.textContent = 'Try again! Watch...';
      setTimeout(() => {
        playMelodySequence();
      }, 1500);
      return;
    }

    // Correct so far
    if (playerInput.length === currentMelody.length) {
      // Completed this animal!
      canInput = false;
      charmAnimal(currentAnimalIndex);
    }
  };
  btn.addEventListener('touchstart', handler, { passive: false });
  btn.addEventListener('mousedown', handler);
});

function taminoPlayAnim() {
  tamino.classList.remove('playing');
  void tamino.offsetWidth; // reflow
  tamino.classList.add('playing');
}

function spawnMusicNote() {
  const notes = ['\u266A', '\u266B', '\u2669'];
  const el = document.createElement('div');
  el.className = 'music-note-float';
  el.textContent = notes[Math.floor(Math.random() * notes.length)];
  el.style.color = ['#f0d060', '#ff6b6b', '#54a0ff', '#5cd85c', '#a55eea'][Math.floor(Math.random() * 5)];
  const tRect = tamino.getBoundingClientRect();
  el.style.left = (tRect.left + tRect.width * 0.6 + Math.random() * 30) + 'px';
  el.style.top = (tRect.top + Math.random() * 20) + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2000);
}

function charmAnimal(index) {
  const animal = ANIMALS[index];
  const el = document.getElementById('animal-' + animal.id);

  // Play fanfare
  playAnimalFanfare();
  playCorrectChime();

  // Transition: appearing then charmed
  el.classList.remove('current');
  el.classList.add('appearing');
  statusText.textContent = `The ${animal.name} is charmed!`;

  // Sparkles around the animal
  spawnSparkles(el);

  setTimeout(() => {
    el.classList.remove('appearing');
    el.classList.add('charmed');

    // Next animal or celebrate
    if (index < ANIMALS.length - 1) {
      setTimeout(() => {
        beginAnimal(index + 1);
      }, 1500);
    } else {
      setTimeout(() => {
        showCelebration();
      }, 2000);
    }
  }, 1200);
}

function spawnSparkles(targetEl) {
  const rect = targetEl.getBoundingClientRect();
  for (let i = 0; i < 12; i++) {
    const spark = document.createElement('div');
    spark.className = 'sparkle';
    spark.style.left = (rect.left + Math.random() * rect.width) + 'px';
    spark.style.top = (rect.top + Math.random() * rect.height) + 'px';
    spark.style.animation = `sparkleAnim ${0.6 + Math.random() * 0.8}s ease-out forwards`;
    spark.style.animationDelay = (Math.random() * 0.3) + 's';
    document.body.appendChild(spark);
    setTimeout(() => spark.remove(), 2000);
  }
}

// Add sparkle animation dynamically
const styleSheet = document.createElement('style');
styleSheet.textContent = `
  @keyframes sparkleAnim {
    0% { opacity: 1; transform: scale(1) rotate(0deg); }
    100% { opacity: 0; transform: scale(0.3) rotate(180deg) translateY(-30px); }
  }
  @keyframes celebrationDance {
    0%, 100% { transform: translateY(0) rotate(0deg) scale(1); }
    25% { transform: translateY(-15px) rotate(-5deg) scale(1.05); }
    50% { transform: translateY(-5px) rotate(0deg) scale(1); }
    75% { transform: translateY(-12px) rotate(5deg) scale(1.05); }
  }
`;
document.head.appendChild(styleSheet);

function showCelebration() {
  // Make all animals dance more vigorously
  ANIMALS.forEach(a => {
    const el = document.getElementById('animal-' + a.id);
    el.style.animation = 'celebrationDance 1s ease-in-out infinite';
    el.style.animationDelay = (Math.random() * 0.5) + 's';
  });

  playCelebrationMelody();

  // Confetti
  spawnConfetti();

  statusText.textContent = 'All animals are dancing!';

  // Show celebration screen after a moment
  setTimeout(() => {
    document.getElementById('celebration-screen').classList.remove('hidden');
  }, 3000);
}

function spawnConfetti() {
  const colors = ['#ff6b6b', '#54a0ff', '#5cd85c', '#ffd93d', '#a55eea', '#ff9ff3', '#f0d060'];
  for (let i = 0; i < 50; i++) {
    const conf = document.createElement('div');
    conf.className = 'confetti';
    conf.style.left = (Math.random() * 100) + '%';
    conf.style.top = '-20px';
    conf.style.width = (6 + Math.random() * 8) + 'px';
    conf.style.height = (6 + Math.random() * 8) + 'px';
    conf.style.background = colors[Math.floor(Math.random() * colors.length)];
    conf.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    conf.style.animationDuration = (2 + Math.random() * 3) + 's';
    conf.style.animationDelay = (Math.random() * 2) + 's';
    document.body.appendChild(conf);
    setTimeout(() => conf.remove(), 7000);
  }
}

function finishGame() {
  // Send completion message
  try {
    window.parent.postMessage({ game: 'magic-flute-animals', event: 'complete' }, '*');
  } catch (e) {}

  // Also try for same-window listeners
  try {
    window.postMessage({ game: 'magic-flute-animals', event: 'complete' }, '*');
  } catch (e) {}
}
</script>
