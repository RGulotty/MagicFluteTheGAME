<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Queen of the Night's Aria</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  touch-action: manipulation;
  -webkit-user-select: none; user-select: none;
  background: #030012;
  font-family: 'Georgia', serif;
}
canvas {
  display: block;
  position: absolute;
  top: 0; left: 0;
  z-index: 1;
}
#ui-layer {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 10;
  pointer-events: none;
}
#ui-layer > * { pointer-events: auto; }

/* Stars for constellations */
.constellation-star {
  position: absolute;
  width: 54px; height: 54px;
  border-radius: 50%;
  background: radial-gradient(circle, #ffd700 0%, #ffaa00 40%, rgba(255,170,0,0) 70%);
  cursor: pointer;
  z-index: 20;
  display: flex;
  align-items: center;
  justify-content: center;
  transform: translate(-50%, -50%);
  transition: transform 0.15s ease;
  pointer-events: auto;
}
.constellation-star .star-inner {
  width: 30px; height: 30px;
  border-radius: 50%;
  background: radial-gradient(circle, #fff 0%, #ffd700 60%, #cc8800 100%);
  box-shadow: 0 0 15px #ffd700, 0 0 30px rgba(255,215,0,0.5);
}
.constellation-star .star-number {
  position: absolute;
  bottom: -18px;
  font-size: 16px;
  font-weight: bold;
  color: #fff;
  text-shadow: 0 0 6px #000, 0 0 3px #000;
  pointer-events: none;
}
.constellation-star.pulse {
  animation: starPulse 1.2s ease-in-out infinite;
}
.constellation-star.locked {
  animation: none;
  pointer-events: none;
}
.constellation-star.locked .star-inner {
  background: radial-gradient(circle, #fff 0%, #ffe066 50%, #ffd700 100%);
  box-shadow: 0 0 25px #ffd700, 0 0 50px rgba(255,215,0,0.7);
}
.constellation-star.wrong {
  animation: starShake 0.4s ease;
}
@keyframes starPulse {
  0%, 100% { transform: translate(-50%, -50%) scale(1); }
  50% { transform: translate(-50%, -50%) scale(1.2); }
}
@keyframes starShake {
  0%, 100% { transform: translate(-50%, -50%) translateX(0); }
  25% { transform: translate(-50%, -50%) translateX(-8px); }
  75% { transform: translate(-50%, -50%) translateX(8px); }
}
@keyframes starFlash {
  0% { box-shadow: 0 0 30px #fff, 0 0 60px #ffd700; }
  100% { box-shadow: 0 0 15px #ffd700, 0 0 30px rgba(255,215,0,0.5); }
}

/* Line canvas for constellation connections */
#line-canvas {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 15;
  pointer-events: none;
}

/* Message overlay */
#message {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  color: #ffd700;
  font-size: 28px;
  text-align: center;
  text-shadow: 0 0 20px rgba(255,215,0,0.8), 0 2px 4px #000;
  opacity: 0;
  transition: opacity 0.5s ease;
  pointer-events: none;
  z-index: 30;
}
#message.visible { opacity: 1; }

/* Intro overlay */
#intro-overlay {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 50;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  padding-bottom: 15%;
  cursor: pointer;
}
#intro-text {
  color: #e0d0ff;
  font-size: 22px;
  text-align: center;
  text-shadow: 0 0 15px rgba(150,100,255,0.8), 0 2px 4px #000;
  padding: 0 20px;
  line-height: 1.5;
}
#tap-hint {
  color: #aaa;
  font-size: 16px;
  margin-top: 20px;
  animation: tapPulse 2s ease-in-out infinite;
}
@keyframes tapPulse {
  0%, 100% { opacity: 0.5; }
  50% { opacity: 1; }
}

/* Victory screen */
#victory {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 50;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,30,0.3);
}
#victory h1 {
  color: #ffd700;
  font-size: 32px;
  text-align: center;
  text-shadow: 0 0 20px rgba(255,215,0,0.8);
  margin-bottom: 30px;
  padding: 0 20px;
}
#victory button {
  padding: 18px 40px;
  font-size: 22px;
  font-family: Georgia, serif;
  background: linear-gradient(135deg, #ffd700, #ff8c00);
  color: #2a0a00;
  border: none;
  border-radius: 30px;
  cursor: pointer;
  box-shadow: 0 0 20px rgba(255,215,0,0.6);
}
</style>
</head>
<body>

<canvas id="sky"></canvas>
<canvas id="line-canvas"></canvas>
<div id="ui-layer"></div>
<div id="message"></div>

<div id="intro-overlay">
  <div id="intro-text">The Queen of the Night is angry!<br>Connect the stars to calm the sky!</div>
  <div id="tap-hint">Tap anywhere to begin</div>
</div>

<div id="victory">
  <h1>Wonderful, Tony!<br>The stars protect Princess Pamina!</h1>
  <button id="victory-btn">Great job, Tony!</button>
</div>

<script>
// ==================== SETUP ====================
const skyCanvas = document.getElementById('sky');
const ctx = skyCanvas.getContext('2d');
const lineCanvas = document.getElementById('line-canvas');
const lctx = lineCanvas.getContext('2d');
const uiLayer = document.getElementById('ui-layer');
const messageEl = document.getElementById('message');

let W, H;
function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  skyCanvas.width = W;
  skyCanvas.height = H;
  lineCanvas.width = W;
  lineCanvas.height = H;
}
resize();
window.addEventListener('resize', () => { resize(); });

let frame = 0;
let phase = 0; // 0=intro, 1=game, 2=victory
let queenPower = 1.0; // 1.0 = full, 0.0 = gone
let lightningFreq = 0.015; // probability per frame
let nextLightning = 0;
let lightningAlpha = 0;
let introStartTime = 0;
let musicStarted = false;

// Audio context
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

// Background music
let bgMusic = null;
function startMusic() {
  if (musicStarted) return;
  musicStarted = true;
  bgMusic = new Audio('Queenofnight.mp3');
  bgMusic.loop = true;
  bgMusic.volume = 0.6;
  bgMusic.play().catch(() => {});
}

// Sound effects
function playChime() {
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.frequency.value = 1200;
  osc.type = 'sine';
  gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.4);
}

function playWrongTap() {
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.frequency.value = 200;
  osc.type = 'sine';
  gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.3);
}

function playFanfare() {
  ensureAudio();
  const notes = [523, 659, 784, 1047];
  notes.forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.frequency.value = freq;
    osc.type = 'sine';
    const t = audioCtx.currentTime + i * 0.12;
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.25, t + 0.05);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
    osc.start(t);
    osc.stop(t + 0.5);
  });
}

function playRumble() {
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.frequency.value = 60;
  osc.type = 'sine';
  gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.0);
  osc.start();
  osc.stop(audioCtx.currentTime + 1.0);
}

function playVictoryChord() {
  ensureAudio();
  const freqs = [262, 330, 392, 523, 659, 784];
  freqs.forEach((freq) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.frequency.value = freq;
    osc.type = 'sine';
    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 2.0);
    osc.start();
    osc.stop(audioCtx.currentTime + 2.0);
  });
}

// ==================== BACKGROUND STARS ====================
const bgStars = [];
for (let i = 0; i < 200; i++) {
  bgStars.push({
    x: Math.random(),
    y: Math.random(),
    r: 0.5 + Math.random() * 1.5,
    twinkleSpeed: 0.02 + Math.random() * 0.04,
    twinkleOffset: Math.random() * Math.PI * 2
  });
}

function drawBgStars() {
  bgStars.forEach(s => {
    const brightness = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(frame * s.twinkleSpeed + s.twinkleOffset));
    ctx.fillStyle = `rgba(255,255,255,${brightness})`;
    ctx.beginPath();
    ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
    ctx.fill();
  });
}

// ==================== 4-POINT STAR HELPER ====================
function drawStar4(x, y, r) {
  ctx.beginPath();
  for (let i = 0; i < 4; i++) {
    const angle = (i / 4) * Math.PI * 2 - Math.PI / 2;
    const ox = Math.cos(angle) * r;
    const oy = Math.sin(angle) * r;
    if (i === 0) ctx.moveTo(x + ox, y + oy);
    else ctx.lineTo(x + ox, y + oy);
    const midAngle = angle + Math.PI / 4;
    ctx.lineTo(x + Math.cos(midAngle) * r * 0.3, y + Math.sin(midAngle) * r * 0.3);
  }
  ctx.closePath();
  ctx.fill();
}

// ==================== QUEEN OF THE NIGHT ====================
function drawQueen() {
  const alpha = queenPower;
  if (alpha < 0.05) return;

  const qx = W * 0.5;
  const qy = H * 0.22;
  const s = Math.min(W, H) * 0.16;

  ctx.save();
  ctx.globalAlpha = alpha;

  // Aura glow
  const auraGlow = ctx.createRadialGradient(qx, qy, 0, qx, qy, s * 4);
  const glowIntensity = queenPower * 0.2;
  auraGlow.addColorStop(0, `rgba(120,80,200,${glowIntensity})`);
  auraGlow.addColorStop(0.5, `rgba(60,40,150,${glowIntensity * 0.3})`);
  auraGlow.addColorStop(1, 'rgba(20,20,60,0)');
  ctx.fillStyle = auraGlow;
  ctx.beginPath();
  ctx.arc(qx, qy, s * 4, 0, Math.PI * 2);
  ctx.fill();

  // Sway animation
  const sway = Math.sin(frame * 0.025) * s * 0.03;

  // Queen's gown - dark flowing
  const gownSway = Math.sin(frame * 0.02) * s * 0.05;
  ctx.fillStyle = `rgba(10,8,48,${alpha})`;
  ctx.beginPath();
  ctx.moveTo(qx - s * 0.5 + sway, qy);
  ctx.quadraticCurveTo(qx - s * 0.6 + sway, qy + s * 1.2, qx - s * 1.4 + gownSway, qy + s * 3.0);
  ctx.lineTo(qx + s * 1.4 + gownSway, qy + s * 3.0);
  ctx.quadraticCurveTo(qx + s * 0.6 + sway, qy + s * 1.2, qx + s * 0.5 + sway, qy);
  ctx.closePath();
  ctx.fill();

  // Gown shimmer
  ctx.fillStyle = `rgba(21,16,74,${alpha * 0.6})`;
  ctx.beginPath();
  ctx.moveTo(qx - s * 0.3 + sway, qy + s * 0.5);
  ctx.quadraticCurveTo(qx - s * 0.8 + sway, qy + s * 1.5, qx - s * 1.1 + gownSway, qy + s * 2.8);
  ctx.lineTo(qx - s * 0.5 + gownSway, qy + s * 3.0);
  ctx.quadraticCurveTo(qx - s * 0.4 + sway, qy + s * 1.5, qx - s * 0.2 + sway, qy + s * 0.7);
  ctx.closePath();
  ctx.fill();

  // Gown stars and moon crescents
  for (let i = 0; i < 12; i++) {
    const gsx = qx + Math.sin(i * 3.7 + 1.2) * s * 0.8 + sway;
    const gsy = qy + s * 0.6 + (i / 12) * s * 1.8;
    const gsa = (0.3 + 0.4 * Math.sin(frame * 0.03 + i * 2)) * alpha;
    ctx.fillStyle = `rgba(200,200,255,${gsa})`;
    drawStar4(gsx, gsy, 2);
  }
  // Moon crescents on gown
  for (let i = 0; i < 3; i++) {
    const mx = qx + Math.sin(i * 5.1 + 2) * s * 0.5 + sway;
    const my = qy + s * 1.0 + i * s * 0.5;
    const ma = (0.2 + 0.2 * Math.sin(frame * 0.025 + i * 3)) * alpha;
    ctx.strokeStyle = `rgba(200,200,255,${ma})`;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(mx, my, 5, -Math.PI * 0.3, Math.PI * 0.8);
    ctx.stroke();
  }

  // Bodice
  ctx.fillStyle = `rgba(10,8,48,${alpha})`;
  ctx.beginPath();
  ctx.moveTo(qx - s * 0.45 + sway, qy);
  ctx.lineTo(qx + s * 0.45 + sway, qy);
  ctx.lineTo(qx + s * 0.5 + sway, qy + s * 0.5);
  ctx.lineTo(qx - s * 0.5 + sway, qy + s * 0.5);
  ctx.closePath();
  ctx.fill();

  // Silver necklace
  ctx.strokeStyle = `rgba(192,192,224,${alpha})`;
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(qx - s * 0.3 + sway, qy);
  ctx.quadraticCurveTo(qx + sway, qy + s * 0.15, qx + s * 0.3 + sway, qy);
  ctx.stroke();

  // Neck
  ctx.fillStyle = `rgba(216,192,160,${alpha})`;
  ctx.fillRect(qx - s * 0.08 + sway, qy - s * 0.15, s * 0.16, s * 0.2);

  // Head
  ctx.fillStyle = `rgba(216,192,160,${alpha})`;
  ctx.beginPath();
  ctx.ellipse(qx + sway, qy - s * 0.35, s * 0.22, s * 0.28, 0, 0, Math.PI * 2);
  ctx.fill();

  // Wing/horn headdress
  ctx.fillStyle = `rgba(8,8,26,${alpha})`;
  // Left wing
  ctx.beginPath();
  ctx.moveTo(qx - s * 0.15 + sway, qy - s * 0.5);
  ctx.quadraticCurveTo(qx - s * 1.2 + sway, qy - s * 2.2, qx - s * 1.5 + sway, qy - s * 2.8);
  ctx.quadraticCurveTo(qx - s * 0.9 + sway, qy - s * 1.8, qx - s * 0.3 + sway, qy - s * 0.7);
  ctx.closePath();
  ctx.fill();
  // Right wing
  ctx.beginPath();
  ctx.moveTo(qx + s * 0.15 + sway, qy - s * 0.5);
  ctx.quadraticCurveTo(qx + s * 1.2 + sway, qy - s * 2.2, qx + s * 1.5 + sway, qy - s * 2.8);
  ctx.quadraticCurveTo(qx + s * 0.9 + sway, qy - s * 1.8, qx + s * 0.3 + sway, qy - s * 0.7);
  ctx.closePath();
  ctx.fill();
  // Inner wing detail
  ctx.fillStyle = `rgba(16,16,48,${alpha})`;
  ctx.beginPath();
  ctx.moveTo(qx - s * 0.1 + sway, qy - s * 0.55);
  ctx.quadraticCurveTo(qx - s * 0.8 + sway, qy - s * 1.9, qx - s * 1.2 + sway, qy - s * 2.3);
  ctx.quadraticCurveTo(qx - s * 0.7 + sway, qy - s * 1.5, qx - s * 0.2 + sway, qy - s * 0.65);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(qx + s * 0.1 + sway, qy - s * 0.55);
  ctx.quadraticCurveTo(qx + s * 0.8 + sway, qy - s * 1.9, qx + s * 1.2 + sway, qy - s * 2.3);
  ctx.quadraticCurveTo(qx + s * 0.7 + sway, qy - s * 1.5, qx + s * 0.2 + sway, qy - s * 0.65);
  ctx.closePath();
  ctx.fill();

  // Stars on headdress tips
  const tipGlow = 0.6 + 0.4 * Math.sin(frame * 0.06);
  ctx.fillStyle = `rgba(255,255,200,${tipGlow * alpha})`;
  drawStar4(qx - s * 1.5 + sway, qy - s * 2.8, 4);
  drawStar4(qx + s * 1.5 + sway, qy - s * 2.8, 4);

  // Headdress swirling stars
  for (let i = 0; i < 8; i++) {
    const angle = (i / 8) * Math.PI * 1.4 - Math.PI * 0.2;
    const dist = s * 1.5 + Math.sin(i * 2.3) * s * 0.3;
    const tsx = qx + Math.sin(angle - Math.PI / 2) * dist * 0.9 + sway;
    const tsy = qy - s * 0.5 - Math.cos(angle - Math.PI / 2) * dist;
    const tsa = (0.5 + 0.5 * Math.sin(frame * 0.04 + i * 1.3)) * alpha;
    ctx.fillStyle = `rgba(255,255,200,${tsa})`;
    drawStar4(tsx, tsy, 2.5);
  }

  // Dark hair
  ctx.fillStyle = `rgba(8,8,26,${alpha})`;
  ctx.beginPath();
  ctx.arc(qx + sway, qy - s * 0.45, s * 0.25, Math.PI * 0.7, Math.PI * 2.3);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(qx - s * 0.18 + sway, qy - s * 0.35, s * 0.09, s * 0.18, -0.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(qx + s * 0.18 + sway, qy - s * 0.35, s * 0.09, s * 0.18, 0.2, 0, Math.PI * 2);
  ctx.fill();

  // Eyes - glowing
  const eyeGlow = queenPower;
  // Eye whites
  ctx.fillStyle = `rgba(255,255,255,${alpha})`;
  ctx.beginPath();
  ctx.ellipse(qx - s * 0.08 + sway, qy - s * 0.38, s * 0.05, s * 0.035, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(qx + s * 0.08 + sway, qy - s * 0.38, s * 0.05, s * 0.035, 0, 0, Math.PI * 2);
  ctx.fill();
  // Glowing pupils
  const pupilColor = `rgba(${100 + 155 * eyeGlow},${150 + 105 * eyeGlow},255,${alpha})`;
  ctx.fillStyle = pupilColor;
  ctx.beginPath();
  ctx.arc(qx - s * 0.07 + sway, qy - s * 0.38, s * 0.025, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(qx + s * 0.09 + sway, qy - s * 0.38, s * 0.025, 0, Math.PI * 2);
  ctx.fill();
  // Eye glow effect
  if (eyeGlow > 0.3) {
    const eg = ctx.createRadialGradient(qx - s * 0.07 + sway, qy - s * 0.38, 0, qx - s * 0.07 + sway, qy - s * 0.38, s * 0.15);
    eg.addColorStop(0, `rgba(150,200,255,${0.3 * eyeGlow * alpha})`);
    eg.addColorStop(1, 'rgba(150,200,255,0)');
    ctx.fillStyle = eg;
    ctx.beginPath();
    ctx.arc(qx - s * 0.07 + sway, qy - s * 0.38, s * 0.15, 0, Math.PI * 2);
    ctx.fill();
    const eg2 = ctx.createRadialGradient(qx + s * 0.09 + sway, qy - s * 0.38, 0, qx + s * 0.09 + sway, qy - s * 0.38, s * 0.15);
    eg2.addColorStop(0, `rgba(150,200,255,${0.3 * eyeGlow * alpha})`);
    eg2.addColorStop(1, 'rgba(150,200,255,0)');
    ctx.fillStyle = eg2;
    ctx.beginPath();
    ctx.arc(qx + s * 0.09 + sway, qy - s * 0.38, s * 0.15, 0, Math.PI * 2);
    ctx.fill();
  }

  // Red lips (open - singing)
  ctx.fillStyle = `rgba(160,48,64,${alpha})`;
  ctx.beginPath();
  const mouthOpen = 0.02 + 0.015 * Math.sin(frame * 0.15) * queenPower;
  ctx.ellipse(qx + sway, qy - s * 0.22, s * 0.06, s * mouthOpen, 0, 0, Math.PI * 2);
  ctx.fill();

  // Arms extended dramatically
  ctx.strokeStyle = `rgba(10,8,48,${alpha})`;
  ctx.lineWidth = s * 0.15;
  ctx.lineCap = 'round';
  // Left arm raised
  ctx.beginPath();
  ctx.moveTo(qx - s * 0.45 + sway, qy + s * 0.15);
  ctx.quadraticCurveTo(qx - s * 0.9 + sway, qy - s * 0.1, qx - s * 1.1 + sway, qy + s * 0.2);
  ctx.stroke();
  ctx.fillStyle = `rgba(216,192,160,${alpha})`;
  ctx.beginPath();
  ctx.arc(qx - s * 1.1 + sway, qy + s * 0.2, s * 0.06, 0, Math.PI * 2);
  ctx.fill();
  // Right arm raised
  ctx.strokeStyle = `rgba(10,8,48,${alpha})`;
  ctx.beginPath();
  ctx.moveTo(qx + s * 0.45 + sway, qy + s * 0.15);
  ctx.quadraticCurveTo(qx + s * 0.9 + sway, qy - s * 0.1, qx + s * 1.1 + sway, qy + s * 0.2);
  ctx.stroke();
  ctx.fillStyle = `rgba(216,192,160,${alpha})`;
  ctx.beginPath();
  ctx.arc(qx + s * 1.1 + sway, qy + s * 0.2, s * 0.06, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

// ==================== PAMINA ====================
function drawPamina(happy) {
  const px = W * 0.5;
  const py = H * 0.92;
  const s = Math.min(W, H) * 0.04;

  ctx.save();

  // White dress
  ctx.fillStyle = '#e8e0d8';
  ctx.beginPath();
  ctx.moveTo(px - s * 0.4, py - s * 0.3);
  ctx.lineTo(px + s * 0.4, py - s * 0.3);
  ctx.lineTo(px + s * 0.7, py + s * 1.2);
  ctx.lineTo(px - s * 0.7, py + s * 1.2);
  ctx.closePath();
  ctx.fill();

  // Head
  ctx.fillStyle = '#f0d8c0';
  ctx.beginPath();
  ctx.arc(px, py - s * 0.7, s * 0.35, 0, Math.PI * 2);
  ctx.fill();

  // Blonde hair
  ctx.fillStyle = '#e8c840';
  ctx.beginPath();
  ctx.arc(px, py - s * 0.8, s * 0.38, Math.PI * 0.8, Math.PI * 2.2);
  ctx.fill();
  // Hair sides
  ctx.beginPath();
  ctx.ellipse(px - s * 0.3, py - s * 0.5, s * 0.1, s * 0.25, -0.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(px + s * 0.3, py - s * 0.5, s * 0.1, s * 0.25, 0.2, 0, Math.PI * 2);
  ctx.fill();

  // Eyes
  ctx.fillStyle = '#446';
  ctx.beginPath();
  ctx.arc(px - s * 0.1, py - s * 0.72, s * 0.04, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(px + s * 0.1, py - s * 0.72, s * 0.04, 0, Math.PI * 2);
  ctx.fill();

  // Mouth
  if (happy) {
    // Smile
    ctx.strokeStyle = '#c06060';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(px, py - s * 0.58, s * 0.08, 0.1, Math.PI - 0.1);
    ctx.stroke();
  } else {
    // Worried frown
    ctx.strokeStyle = '#c06060';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(px, py - s * 0.5, s * 0.06, Math.PI + 0.3, Math.PI * 2 - 0.3);
    ctx.stroke();
    // Worried eyebrows
    ctx.strokeStyle = '#b08030';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(px - s * 0.15, py - s * 0.85);
    ctx.lineTo(px - s * 0.05, py - s * 0.82);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(px + s * 0.15, py - s * 0.85);
    ctx.lineTo(px + s * 0.05, py - s * 0.82);
    ctx.stroke();
  }

  ctx.restore();
}

// ==================== LIGHTNING ====================
function drawLightning() {
  if (lightningAlpha > 0) {
    ctx.save();
    ctx.fillStyle = `rgba(200,200,255,${lightningAlpha * 0.15})`;
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
    lightningAlpha *= 0.85;
  }

  if (Math.random() < lightningFreq * queenPower) {
    lightningAlpha = 1;
    // Draw a bolt
    ctx.save();
    ctx.strokeStyle = `rgba(200,200,255,${0.7 * queenPower})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    let lx = W * (0.2 + Math.random() * 0.6);
    let ly = 0;
    ctx.moveTo(lx, ly);
    for (let i = 0; i < 6; i++) {
      lx += (Math.random() - 0.5) * 60;
      ly += 20 + Math.random() * 40;
      ctx.lineTo(lx, ly);
    }
    ctx.stroke();
    ctx.restore();
  }
}

// ==================== SKY GRADIENT ====================
function drawSky() {
  const brightness = 1 - queenPower; // 0 = dark, 1 = bright
  const r1 = Math.floor(3 + brightness * 10);
  const g1 = Math.floor(0 + brightness * 5);
  const b1 = Math.floor(18 + brightness * 30);
  const r2 = Math.floor(15 + brightness * 25);
  const g2 = Math.floor(10 + brightness * 20);
  const b2 = Math.floor(50 + brightness * 60);

  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, `rgb(${r1},${g1},${b1})`);
  grad.addColorStop(0.5, `rgb(${r2},${g2},${b2})`);
  grad.addColorStop(1, `rgb(${Math.floor(r1 * 0.7)},${Math.floor(g1 * 0.7)},${Math.floor(b1 * 0.8)})`);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
}

// ==================== CONSTELLATIONS ====================
const constellations = [
  {
    name: 'Duck',

      [0.33, 0.48],  // 2: head top

    ],

  },
  {

    // A rabbit: ear tips, head, body, tail

      [0.65, 0.72],  // 5: sole front

    ],

    stars: [

      [0.45, 0.45],  // 3: bowl top right
      [0.48, 0.52],  // 4: bowl right / handle start

    stars: [

      [0.55, 0.44],  // 5: head top
      [0.62, 0.54],  // 6: nose

      [0.40, 0.62],  // 8: belly
    ],
    flyTo: [0.12, 0.15]  // upper left
  }
];

const praises = [
  "Good job, Tony!",
  "Amazing, Tony!",
  "You did it, Tony!",
  "Wonderful, Tony!",
  "Super star, Tony!"
];

let currentConstellation = 0;
let currentStarIndex = 0;
let starElements = [];
let completedConstellations = []; // Array of {stars, lines}

// ==================== DRAW COMPLETED CONSTELLATIONS ====================
function drawCompletedConstellations() {
  lctx.clearRect(0, 0, W, H);

  completedConstellations.forEach(cc => {
    const p = cc.progress || 0;
    const s = cc.scale || 1;
    const tx = (cc.targetX || 0.1);
    const ty = (cc.targetY || 0.1);

    // Calculate center of the constellation for scaling/translation
    let cx = 0, cy = 0;
    cc.stars.forEach(star => { cx += star[0]; cy += star[1]; });
    cx /= cc.stars.length;
    cy /= cc.stars.length;

    // Interpolated center: original center → target corner
    const icx = (cx + (tx - cx) * p) * W;
    const icy = (cy + (ty - cy) * p) * H;

    lctx.save();
    lctx.translate(icx, icy);
    lctx.scale(s, s);
    lctx.translate(-icx, -icy);

    // Draw golden lines
    lctx.strokeStyle = '#ffd700';
    lctx.lineWidth = 3;
    lctx.shadowColor = '#ffd700';
    lctx.shadowBlur = 8;
    lctx.globalAlpha = 0.5 + 0.5 * (1 - p); // slightly faded when in corner
    lctx.beginPath();
    cc.stars.forEach((star, i) => {
      const x = (star[0] + (tx - cx) * p) * W;
      const y = (star[1] + (ty - cy) * p) * H;
      if (i === 0) lctx.moveTo(x, y);
      else lctx.lineTo(x, y);
    });
    lctx.lineTo(
      (cc.stars[0][0] + (tx - cx) * p) * W,
      (cc.stars[0][1] + (ty - cy) * p) * H
    );
    lctx.stroke();
    lctx.shadowBlur = 0;

    // Draw star dots
    cc.stars.forEach(star => {
      const x = (star[0] + (tx - cx) * p) * W;
      const y = (star[1] + (ty - cy) * p) * H;
      lctx.fillStyle = '#ffd700';
      lctx.shadowColor = '#ffd700';
      lctx.shadowBlur = 10;
      lctx.beginPath();
      lctx.arc(x, y, 6 * s, 0, Math.PI * 2);
      lctx.fill();
      lctx.shadowBlur = 0;
    });

    lctx.globalAlpha = 1;
    lctx.restore();
  });

  // Draw in-progress lines
  if (phase === 1 && currentStarIndex > 0) {
    const cc = constellations[currentConstellation];
    lctx.strokeStyle = '#ffd700';
    lctx.lineWidth = 3;
    lctx.shadowColor = '#ffd700';
    lctx.shadowBlur = 10;
    lctx.beginPath();
    for (let i = 0; i < currentStarIndex; i++) {
      const x = cc.stars[i][0] * W;
      const y = cc.stars[i][1] * H;
      if (i === 0) lctx.moveTo(x, y);
      else lctx.lineTo(x, y);
    }
    lctx.stroke();
    lctx.shadowBlur = 0;
  }

  // Draw guide lines for current constellation
  if (phase === 1 && currentConstellation < constellations.length) {
    const cc = constellations[currentConstellation];
    lctx.setLineDash([4, 6]);
    lctx.strokeStyle = 'rgba(255,255,255,0.2)';
    lctx.lineWidth = 1.5;
    lctx.beginPath();
    cc.stars.forEach((s, i) => {
      const x = s[0] * W;
      const y = s[1] * H;
      if (i === 0) lctx.moveTo(x, y);
      else lctx.lineTo(x, y);
    });
    lctx.lineTo(cc.stars[0][0] * W, cc.stars[0][1] * H);
    lctx.stroke();
    lctx.setLineDash([]);
  }
}

// ==================== SPAWN CONSTELLATION STARS ====================
function spawnConstellation(index) {
  // Clear old star elements
  starElements.forEach(el => el.remove());
  starElements = [];
  currentStarIndex = 0;

  const cc = constellations[index];
  cc.stars.forEach((pos, i) => {
    const el = document.createElement('div');
    el.className = 'constellation-star pulse';
    el.style.left = (pos[0] * 100) + '%';
    el.style.top = (pos[1] * 100) + '%';

    const inner = document.createElement('div');
    inner.className = 'star-inner';
    el.appendChild(inner);

    const num = document.createElement('div');
    num.className = 'star-number';
    num.textContent = (i + 1);
    el.appendChild(num);

    el.addEventListener('click', () => handleStarTap(i));
    el.addEventListener('touchstart', (e) => {
      e.preventDefault();
      handleStarTap(i);
    }, { passive: false });

    uiLayer.appendChild(el);
    starElements.push(el);
  });

  drawCompletedConstellations();
}

function handleStarTap(index) {
  if (phase !== 1) return;
  if (index === currentStarIndex) {
    // Correct!
    playChime();
    const el = starElements[index];
    el.classList.remove('pulse');
    el.classList.add('locked');
    el.style.animation = 'starFlash 0.5s ease';

    currentStarIndex++;
    drawCompletedConstellations();

    if (currentStarIndex >= constellations[currentConstellation].stars.length) {
      // Constellation complete!
      constellationComplete();
    }
  } else {
    // Wrong star
    playWrongTap();
    const el = starElements[index];
    el.classList.add('wrong');
    setTimeout(() => el.classList.remove('wrong'), 400);
  }
}

function constellationComplete() {
  playFanfare();
  playRumble();

  const cc = constellations[currentConstellation];
  const flyTo = cc.flyTo || [0.1, 0.1];

  // Store completed constellation with fly-to animation state
  const completed = {
    stars: [...cc.stars],
    // Animation: starts at original position, will lerp to corner
    progress: 0,
    targetX: flyTo[0],
    targetY: flyTo[1],
    scale: 1
  };
  completedConstellations.push(completed);

  // Animate flying to corner
  const startTime = performance.now();
  const flyDuration = 1500;
  function animateFly(now) {
    const t = Math.min(1, (now - startTime) / flyDuration);
    const ease = t * t * (3 - 2 * t); // smoothstep
    completed.progress = ease;
    completed.scale = 1 - ease * 0.65; // shrink to 35% size
    drawCompletedConstellations();
    if (t < 1) requestAnimationFrame(animateFly);
  }
  requestAnimationFrame(animateFly);

  // Dim queen
  queenPower = Math.max(0, queenPower - 0.2);
  lightningFreq = 0.015 * queenPower;

  // Show praise
  showMessage(praises[currentConstellation]);

  // Clear star elements
  starElements.forEach(el => el.remove());
  starElements = [];

  // Move to next after delay
  setTimeout(() => {
    hideMessage();
    currentConstellation++;
    if (currentConstellation >= constellations.length) {
      startVictory();
    } else {
      spawnConstellation(currentConstellation);
    }
  }, 2500);
}

function showMessage(text) {
  messageEl.textContent = text;
  messageEl.classList.add('visible');
}
function hideMessage() {
  messageEl.classList.remove('visible');
}

// ==================== CONFETTI / SPARKLES ====================
let sparkles = [];
function spawnSparkles(count) {
  for (let i = 0; i < count; i++) {
    sparkles.push({
      x: Math.random() * W,
      y: -10 - Math.random() * H * 0.3,
      vx: (Math.random() - 0.5) * 3,
      vy: 1 + Math.random() * 3,
      r: 2 + Math.random() * 4,
      color: ['#ffd700', '#ff6699', '#66ccff', '#99ff66', '#ff9933', '#cc66ff'][Math.floor(Math.random() * 6)],
      life: 1
    });
  }
}

function updateSparkles() {
  sparkles = sparkles.filter(s => s.life > 0);
  sparkles.forEach(s => {
    s.x += s.vx;
    s.y += s.vy;
    s.vy += 0.05;
    s.life -= 0.005;
    ctx.fillStyle = s.color;
    ctx.globalAlpha = s.life;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  });
}

// ==================== VICTORY ====================
function startVictory() {
  phase = 2;
  starElements.forEach(el => el.remove());
  starElements = [];
  queenPower = 0;
  lightningFreq = 0;

  playVictoryChord();
  spawnSparkles(150);

  // Fade music
  if (bgMusic) {
    let vol = bgMusic.volume;
    const fadeInt = setInterval(() => {
      vol -= 0.02;
      if (vol <= 0) {
        bgMusic.pause();
        clearInterval(fadeInt);
      } else {
        bgMusic.volume = vol;
      }
    }, 50);
  }

  setTimeout(() => {
    const victory = document.getElementById('victory');
    victory.style.display = 'flex';

    document.getElementById('victory-btn').addEventListener('click', () => {
      try {
        window.parent.postMessage({ game: 'queen-aria', event: 'complete' }, '*');
      } catch(e) {}
    });

    // Post completion
    try {
      window.parent.postMessage({ game: 'queen-aria', event: 'complete' }, '*');
    } catch(e) {}
  }, 2000);
}

// ==================== MAIN LOOP ====================
function mainLoop() {
  drawSky();
  drawBgStars();
  drawLightning();
  drawQueen();

  const isHappy = phase === 2;
  drawPamina(isHappy);

  if (phase === 1) {
    drawCompletedConstellations();
  } else if (phase === 2) {
    drawCompletedConstellations();
    updateSparkles();
    // Keep spawning some sparkles
    if (frame % 30 === 0 && sparkles.length < 200) {
      spawnSparkles(10);
    }
  }

  frame++;
  requestAnimationFrame(mainLoop);
}

// ==================== INTRO ====================
const introOverlay = document.getElementById('intro-overlay');

// Start intro animation immediately
introStartTime = performance.now();
mainLoop();

// After 1 second, enable tap to start
introOverlay.addEventListener('click', startGame);
introOverlay.addEventListener('touchstart', (e) => {
  e.preventDefault();
  startGame();
}, { passive: false });

function startGame() {
  if (phase !== 0) return;
  ensureAudio();
  startMusic();
  phase = 1;
  introOverlay.style.display = 'none';

  // Start first constellation
  spawnConstellation(0);
}
